name: Build and test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  web-and-server:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run test:e2e

  desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run desktop:package
        env:
          VITE_SIGNALING_URL: wss://watch-together-p2p-ghost.onrender.com/ws
          VITE_PUBLIC_APP_URL: https://albertweskert.github.io/-/
      - uses: actions/upload-artifact@v4
        with:
          name: watch-together-windows-production
          if-no-files-found: error
          path: |
            desktop-client/src-tauri/target/release/watch-together.exe
            desktop-client/src-tauri/target/release/bundle/nsis/*.exe
